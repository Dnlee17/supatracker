<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="刷卡記帳">
<title>刷卡回饋記帳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#111214;--card:#1c1e22;--card2:#24272d;--text:#f0f0f0;--muted:#8a8f99;--border:#2e3138;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--orange:#f97316;--radius:14px;--shadow:0 2px 16px rgba(0,0,0,0.4)}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-screen p{color:var(--muted);font-size:15px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;z-index:500;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
nav{background:var(--card);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100}
.nav-inner{display:flex;justify-content:space-around;padding:6px 0 8px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border:none;background:none;color:var(--muted);font-size:10px;cursor:pointer}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--accent)}
.page{display:none;padding:16px;max-width:480px;margin:0 auto;padding-bottom:80px;padding-top:16px}
.page.active{display:block}
.section-title{font-size:20px;font-weight:600;margin-bottom:12px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header span{font-size:20px;font-weight:700}
.cal-header button{border:none;background:none;font-size:24px;color:var(--accent);padding:4px 10px;cursor:pointer}
.cal-summary{display:flex;gap:10px;margin-bottom:14px}
.cal-sum-box{flex:1;background:var(--card);border-radius:12px;padding:12px;box-shadow:var(--shadow);text-align:center}
.cal-sum-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.cal-sum-val{font-size:18px;font-weight:700}
.cal-sum-val.income{color:var(--green)}
.cal-sum-val.expense{color:var(--red)}
.cal-grid{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;margin-bottom:14px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
.cal-weekdays span{font-size:11px;color:var(--muted);padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{display:flex;flex-direction:column;align-items:center;padding:5px 2px;border-radius:8px;cursor:pointer;min-height:36px}
.cal-day.today .day-num{background:var(--accent);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.cal-day.selected{background:#1e2a3a}
.cal-day.other-month .day-num{color:#ccc}
.day-num{font-size:14px;font-weight:500}
.cal-add-btns{display:flex;gap:10px;margin-bottom:14px}
.cal-add-btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;color:#fff}
.cal-add-btn.income{background:var(--green)}
.cal-add-btn.expense{background:var(--red)}
.day-records-title{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px}
.tx-item{background:var(--card);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;box-shadow:var(--shadow)}
.tx-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{min-width:0}
.tx-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-right{text-align:right;flex-shrink:0;margin-left:10px}
.tx-amount{font-size:16px;font-weight:600}
.tx-amount.income{color:var(--green)}
.tx-amount.expense{color:var(--red)}
.tx-reward{font-size:11px;color:var(--green);margin-top:1px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-close{float:right;border:none;background:none;font-size:24px;cursor:pointer;color:var(--muted);margin-top:-4px}
.form-group{margin-bottom:14px}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;font-size:16px;background:var(--card2);color:var(--text);-webkit-appearance:none}
textarea{resize:none;height:80px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#2e3340}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-income{background:var(--green)}
.btn-expense{background:var(--red)}
.btn-danger{background:var(--red)}
.btn-primary:disabled{opacity:.5}
.type-toggle{display:flex;gap:8px;margin-bottom:14px}
.type-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--card2);font-size:15px;font-weight:600;cursor:pointer;color:var(--muted)}
.type-btn.active.income{border-color:var(--green);background:#0f2a1a;color:var(--green)}
.type-btn.active.expense{border-color:var(--red);background:#2a0f0f;color:var(--red)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;border:2px solid var(--border);background:var(--card2);cursor:pointer;font-size:11px;color:var(--muted);text-align:center}
.cat-item .ci{font-size:22px}
.cat-item.selected{border-color:var(--accent);background:#1e2a3a;color:var(--accent)}
.subcat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.subcat-chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);font-size:13px;cursor:pointer;color:var(--muted)}
.subcat-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.pay-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.pay-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);font-size:14px;cursor:pointer;color:var(--muted)}
.pay-btn.selected{border-color:var(--accent);background:#1e2a3a;color:var(--accent);font-weight:500}
#reward-preview-box{background:#0f2a1a;border-radius:10px;padding:10px 14px;font-size:14px;color:var(--green);display:none;margin-bottom:14px}
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card2);font-size:13px;cursor:pointer;white-space:nowrap;color:var(--muted)}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.tab-row{display:flex;background:var(--card2);border-radius:10px;padding:3px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--muted)}
.tab-btn.active{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.4)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-name{font-size:16px;font-weight:600}
.card-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-ok{background:#0f2a1a;color:var(--green)}
.badge-warn{background:#2a1f0a;color:var(--orange)}
.badge-over{background:#2a0f0f;color:var(--red)}
.badge-unlimited{background:#0f1e3a;color:var(--accent)}
.progress-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:5px}
.progress-bar{height:6px;background:#e5e5ea;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.fill-ok{background:var(--green)}.fill-warn{background:var(--orange)}.fill-over{background:var(--red)}
.stats-row{display:flex;gap:10px;margin-top:10px}
.stat{flex:1;text-align:center;background:var(--card2);border-radius:10px;padding:8px}
.stat-val{font-size:16px;font-weight:600}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.route-chip{font-size:12px;background:var(--card2);border-radius:20px;padding:4px 10px;color:var(--muted);display:inline-block;margin:2px}
.route-chip span{color:var(--accent);font-weight:600}
.summary-total{background:linear-gradient(135deg,#007aff,#0055d4);color:#fff;border-radius:var(--radius);padding:18px;margin-bottom:14px}
.summary-total .lbl{font-size:13px;opacity:.8}
.summary-total .amt{font-size:32px;font-weight:700;margin:4px 0}
.summary-total .sub{font-size:15px;opacity:.9}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.sum-right{text-align:right;font-size:14px}
.sum-sub{font-size:12px;color:var(--green)}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.month-nav button{border:none;background:none;font-size:24px;cursor:pointer;color:var(--accent);padding:4px 8px}
.month-nav span{font-size:18px;font-weight:600;flex:1;text-align:center}
.settings-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-edit-btn{border:none;background:none;color:var(--accent);font-size:14px;cursor:pointer;padding:4px 8px}
.manage-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.manage-item:last-child{border-bottom:none}
.manage-left{display:flex;align-items:center;gap:10px}
.del-btn{border:none;background:none;color:var(--red);font-size:20px;cursor:pointer;padding:4px}
.edit-btn-sm{border:none;background:none;color:var(--accent);font-size:14px;cursor:pointer;padding:4px 8px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state p{font-size:15px;margin-top:8px}
.add-inline{display:flex;gap:8px;margin-top:10px;margin-bottom:8px}
.add-inline input{flex:1}
.add-inline button{padding:11px 16px;border:none;background:var(--accent);color:#fff;border-radius:10px;font-size:15px;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>
<div id="loading-screen"><div class="spinner"></div><p>載入中…</p></div>
<div id="toast"></div>

<nav>
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首頁
    </button>
    <button class="nav-btn" onclick="showPage('records')" id="nav-records">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>明細
    </button>
    <button class="nav-btn" onclick="showPage('overview')" id="nav-overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>卡片
    </button>
    <button class="nav-btn" onclick="showPage('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></svg>統計
    </button>
    <button class="nav-btn" onclick="showPage('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>設定
    </button>
  </div>
</nav>

<div class="page active" id="page-home">
  <div class="cal-header">
    <button onclick="changeCalMonth(-1)">‹</button>
    <span id="cal-title"></span>
    <button onclick="changeCalMonth(1)">›</button>
  </div>
  <div class="cal-summary">
    <div class="cal-sum-box"><div class="cal-sum-label">收入</div><div class="cal-sum-val income" id="cal-inc">NT$0</div></div>
    <div class="cal-sum-box"><div class="cal-sum-label">支出</div><div class="cal-sum-val expense" id="cal-exp">NT$0</div></div>
    <div class="cal-sum-box"><div class="cal-sum-label">結餘</div><div class="cal-sum-val" id="cal-bal">NT$0</div></div>
  </div>
  <div class="cal-grid">
    <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="cal-days" id="cal-days"></div>
  </div>
  <div class="cal-add-btns">
    <button class="cal-add-btn income" onclick="openTxModal('income')">＋ 新增收入</button>
    <button class="cal-add-btn expense" onclick="openTxModal('expense')">＋ 新增支出</button>
  </div>
  <div id="day-records"></div>
</div>

<div class="page" id="page-records">
  <div class="section-title">帳本明細</div>
  <div class="filter-row" id="rec-filters"></div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="setRecTab('all')">全部</button>
    <button class="tab-btn" onclick="setRecTab('expense')">支出</button>
    <button class="tab-btn" onclick="setRecTab('income')">收入</button>
  </div>
  <div id="rec-list"></div>
</div>

<div class="page" id="page-overview"><div id="overview-content"></div></div>

<div class="page" id="page-stats">
  <div class="month-nav">
    <button onclick="changeStatsMonth(-1)">‹</button>
    <span id="stats-month-label"></span>
    <button onclick="changeStatsMonth(1)">›</button>
  </div>
  <div id="stats-content"></div>
</div>

<div class="page" id="page-settings">
  <div class="section-title">卡片管理</div>
  <div id="cards-settings"></div>
  <button class="btn-primary" onclick="openAddCardModal()" style="margin-top:4px">＋ 新增信用卡</button>
  <div style="height:20px"></div>
  <div class="section-title">付款方式</div>
  <div class="card" id="pay-manage"></div>
  <div class="add-inline">
    <input type="text" id="new-pay-name" placeholder="新增付款方式">
    <button onclick="addPayMethod()">新增</button>
  </div>
  <div class="section-title">消費類別</div>
  <div class="card" id="cat-manage"></div>
  <button class="btn-primary" onclick="openAddCatModal()" style="background:var(--muted);margin-top:8px">＋ 新增類別</button>
</div>

<!-- TX MODAL -->
<div class="modal-overlay" id="tx-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('tx-modal')">×</button>
    <div class="modal-title" id="tx-modal-title">新增支出</div>
    <div class="type-toggle">
      <button class="type-btn active expense" id="tbtn-expense" onclick="setTxType('expense')">支出</button>
      <button class="type-btn" id="tbtn-income" onclick="setTxType('income')">收入</button>
    </div>
    <div class="form-group"><label>日期</label><input type="date" id="tx-date"></div>
    <div class="form-group"><label>消費名稱</label><input type="text" id="tx-name" placeholder="例：全聯、好市多…"></div>
    <div class="form-group"><label>金額 (NT$)</label><input type="number" id="tx-amount" placeholder="0" inputmode="numeric" oninput="updateRewardPreview()"></div>
    <div class="form-group">
      <label>類別</label>
      <div class="cat-grid" id="tx-cat-grid"></div>
      <div class="subcat-row" id="tx-subcat-row"></div>
    </div>
    <div class="form-group" id="pay-group">
      <label>付款方式</label>
      <div class="pay-row" id="tx-pay-row"></div>
    </div>
    <div class="form-group">
      <label>信用卡</label>
      <select id="tx-card" onchange="updateRouteOptions()">
        <option value="">-- 選擇卡片（選填）--</option>
      </select>
    </div>
    <div class="form-group" id="route-group" style="display:none">
      <label>刷卡方案</label>
      <select id="tx-route" onchange="updateRewardPreview()">
        <option value="">-- 選擇方案 --</option>
      </select>
    </div>
    <div id="reward-preview-box">預計回饋：<strong id="reward-preview-val"></strong></div>
    <div class="form-group"><label>備註</label><textarea id="tx-note" placeholder="備註說明（選填）"></textarea></div>
    <input type="hidden" id="tx-edit-id">
    <button class="btn-primary btn-expense" id="tx-save-btn" onclick="saveTx()">儲存</button>
    <button class="btn-primary btn-danger" id="tx-delete-btn" onclick="deleteTx()" style="margin-top:8px;display:none">刪除這筆</button>
  </div>
</div>

<!-- CARD MODAL -->
<div class="modal-overlay" id="card-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('card-modal')">×</button>
    <div class="modal-title" id="card-modal-title">新增信用卡</div>
    <div class="form-group"><label>卡片名稱</label><input type="text" id="card-name"></div>
    <div class="form-group"><label>帳單截止日（每月幾號）</label><input type="number" id="card-billing-day" min="1" max="31"></div>
    <div class="form-group"><label>可刷上限（0 表示無上限）</label><input type="number" id="card-limit" inputmode="numeric"></div>
    <div class="form-group"><label>上期最後入帳消費日</label><input type="date" id="card-last-entry" placeholder="上期帳單最後一筆消費日期"></div>
    <div class="form-group"><label>回饋日說明</label><input type="text" id="card-reward-date" placeholder="例：入帳後、次月15日"></div>
    <div class="form-group">
      <label>刷卡方案與回饋率</label>
      <div id="routes-editor"></div>
      <button type="button" onclick="addRouteRow()" style="margin-top:8px;border:1.5px dashed var(--border);background:none;width:100%;padding:9px;border-radius:9px;font-size:14px;color:var(--accent);cursor:pointer">＋ 新增方案</button>
    </div>
    <input type="hidden" id="card-edit-id">
    <button class="btn-primary" id="card-save-btn" onclick="saveCard()">儲存卡片</button>
    <button class="btn-primary btn-danger" id="card-delete-btn" onclick="deleteCard()" style="margin-top:8px;display:none">刪除這張卡</button>

<script>
const SUPA_URL='https://tabgqvmuttfplqvycfhl.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhYmdxdm11dHRmcGxxdnljZmhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3Mzg4MTYsImV4cCI6MjA5MjMxNDgxNn0.2lPqdBWpKZu82V9o6-1SdSpipRqQbOpeSXQTBWXHzGo';
const H={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=minimal'};

const ICON_MAP={'餐飲':'🍽️','飲食':'🍽️','交通':'🚗','購物':'🛍️','娛樂':'🎬','醫療':'🏥','旅遊':'✈️','住宿':'🏨','其他':'📦','薪資':'💰','獎金':'🎁','投資':'📈','日用品':'🧴','運動':'💪','教育':'📚','水電費':'💡','通訊費':'📡','超市':'🛒','咖啡':'☕','寵物':'🐾'};

// ── SUPABASE API ─────────────────────────────────────────
async function sb(table,method='GET',body=null,query=''){
  const url=`${SUPA_URL}/rest/v1/${table}${query}`;
  const opts={method,headers:{...H}};
  if(body){opts.body=JSON.stringify(body);}
  if(method==='GET')opts.headers['Accept']='application/json';
  const r=await fetch(url,opts);
  if(method==='GET')return r.json();
  return r.ok?{ok:true}:{ok:false,status:r.status};
}

async function init(){
  try{
    const [c,t,r,cat,pay]=await Promise.all([
      sb('cards','GET',null,'?select=*'),
      sb('transactions','GET',null,'?select=*&order=date.desc'),
      sb('routes','GET',null,'?select=*'),
      sb('category','GET',null,'?select=*&order=sortOrder.asc,id.asc'),
      sb('payment','GET',null,'?select=*&order=id.asc'),
    ]);
    cards=c||[];
    transactions=(t||[]).map(normTx);
    routes=r||[];
    cards.forEach(c=>{c.routes=(routes.filter(r=>r.cardId===c.id)).map(r=>({channel:r.channel,rate:Number(r.rate)}));});
    // group categories
    const catMap={};
    (cat||[]).forEach(row=>{
      if(!row.category)return;
      if(!catMap[row.category])catMap[row.category]={subs:[],icon:row.icon||''};
      if(row.subcategory)catMap[row.category].subs.push(row.subcategory);
      if(row.icon)catMap[row.category].icon=row.icon;
    });
    categories=Object.entries(catMap).map(([name,data])=>({name,subs:data.subs,icon:data.icon||''}));
    // build iconOverrides from supabase data
    categories.forEach(c=>{if(c.icon)iconOverrides[c.name]=c.icon;});
    payMethods=(pay||[]).map(p=>p.payment).filter(Boolean);
  }catch(e){showToast('載入失敗，請重試');console.error(e);}
  document.getElementById('loading-screen').style.display='none';
  renderCalendar();
}

function normTx(t){
  return{
    id:String(t.id||''),
    date:String(t.date||'').slice(0,10),
    name:t.name||'',
    amount:Number(t.amount)||0,
    category:t.category||'',
    subcategory:t.subcategory||'',
    payment:t.payment||'',
    cardName:t.cardName||'',
    channel:t.channel||'',
    rate:Number(t.rate)||0,
    reward:Number(t.reward)||0,
    note:t.note||'',
    txType:t.txType||'expense'
  };
}

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtMoney(n){return 'NT$'+Math.round(Math.abs(n)).toLocaleString();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function getYM(d){return d?String(d).slice(0,7):'';}
function getCardById(id){return cards.find(c=>c.id===id);}
function getCardByName(n){return cards.find(c=>c.name===n);}
function getRate(cid,ch){const c=getCardById(cid);if(!c)return 0;const r=(c.routes||[]).find(r=>r.channel===ch);return r?Number(r.rate):0;}
function getAllMonths(){const s=new Set(transactions.map(t=>getYM(t.date)).filter(Boolean));const a=[...s].sort().reverse();const cur=todayStr().slice(0,7);if(!a.includes(cur))a.unshift(cur);return a;}
function getCatObj(name){return categories.find(c=>c.name===name)||{name:name||'其他',subs:[]};}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function getBillingPeriod(card){
  // If lastEntryDate is set, start = lastEntryDate + 1 day
  // End = billingDay of current or next applicable month
  const today=new Date();
  let end;
  const bd=Number(card.billingDay)||1;
  // find the next billing end date >= today
  let ey=today.getFullYear(),em=today.getMonth();
  const tentativeEnd=new Date(ey,em,bd);
  if(tentativeEnd<today){em++;if(em>11){em=0;ey++;}}
  end=new Date(ey,em,bd).toISOString().slice(0,10);
  let start;
  if(card.lastEntryDate){
    // start = lastEntryDate + 1
    const led=new Date(card.lastEntryDate+'T00:00:00');
    led.setDate(led.getDate()+1);
    start=led.toISOString().slice(0,10);
  } else {
    // fallback: billingDay last month
    let sy=today.getFullYear(),sm=today.getMonth();
    if(today.getDate()<bd){sm--;if(sm<0){sm=11;sy--;}}
    start=new Date(sy,sm,bd).toISOString().slice(0,10);
  }
  return{start,end};
}

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  currentPage=p;
  if(p==='home')renderCalendar();
  if(p==='records')renderRecords();
  if(p==='overview')renderOverview();
  if(p==='stats')renderStats();
  if(p==='settings'){renderSettings();renderPayManage();renderCatManage();}
}

// ── CALENDAR ─────────────────────────────────────────────
function renderCalendar(){
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent=`${calYear}年 ${mn[calMonth]}`;
  const ym=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const mTx=transactions.filter(t=>getYM(t.date)===ym);
  const inc=mTx.filter(t=>t.txType==='income').reduce((s,t)=>s+t.amount,0);
  const exp=mTx.filter(t=>t.txType!=='income').reduce((s,t)=>s+t.amount,0);
  document.getElementById('cal-inc').textContent=fmtMoney(inc);
  document.getElementById('cal-exp').textContent=fmtMoney(exp);
  const bal=inc-exp;
  const bel=document.getElementById('cal-bal');
  bel.textContent=(bal<0?'-':'')+fmtMoney(bal);
  bel.style.color=bal>=0?'var(--green)':'var(--red)';
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const prevDim=new Date(calYear,calMonth,0).getDate();
  const tStr=todayStr();
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day other-month"><div class="day-num">${prevDim-firstDay+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dTx=transactions.filter(t=>t.date===ds);
    const dayExp=dTx.filter(t=>t.txType!=='income').reduce((s,t)=>s+t.amount,0);
    let cls='cal-day';if(ds===tStr)cls+=' today';if(ds===selectedDate)cls+=' selected';
    const amtHtml=dayExp>0?`<div style="font-size:9px;color:var(--red)">${dayExp>=1000?Math.round(dayExp/100)/10+'k':dayExp}</div>`:'';
    html+=`<div class="${cls}" onclick="selectDate('${ds}')"><div class="day-num">${d}</div>${amtHtml}</div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++) html+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  document.getElementById('cal-days').innerHTML=html;
  renderDayRecords();
}

function selectDate(d){selectedDate=d;renderCalendar();}
function changeCalMonth(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}

function renderDayRecords(){
  const el=document.getElementById('day-records');
  const d=new Date(selectedDate+'T00:00:00');
  const wd=['日','一','二','三','四','五','六'];
  const dTx=transactions.filter(t=>t.date===selectedDate);
  if(!dTx.length){el.innerHTML=`<div class="day-records-title">${d.getMonth()+1}月${d.getDate()}日 (${wd[d.getDay()]})</div><div class="empty-state"><p>這天沒有記錄</p></div>`;return;}
  let html=`<div class="day-records-title">${d.getMonth()+1}月${d.getDate()}日 (${wd[d.getDay()]})</div>`;
  dTx.forEach(t=>html+=txItemHtml(t));
  el.innerHTML=html;
}

function txItemHtml(t){
  const icon=getIcon(t.category);
  const isInc=t.txType==='income';
  const meta=[t.subcategory,t.payment,t.cardName,t.channel,t.note].filter(Boolean).join(' · ');
  return`<div class="tx-item" onclick="openEditTxModal('${t.id}')">
    <div class="tx-left">
      <div class="tx-icon" style="background:${isInc?'#0f2a1a':'#2a0f0f'}">${icon}</div>
      <div class="tx-info">
        <div class="tx-name">${t.category||'未分類'}${t.subcategory?' · '+t.subcategory:''}${t.name?' — '+t.name:''}</div>
        <div class="tx-meta">${meta||'無備註'}</div>
      </div>
    </div>
    <div class="tx-right">
      <div class="tx-amount ${isInc?'income':'expense'}">${isInc?'+':'-'}${fmtMoney(t.amount)}</div>
      ${t.reward>0?`<div class="tx-reward">+${Number(t.reward).toFixed(1)} 回饋</div>`:''}
    </div>
  </div>`;
}

// ── RECORDS ──────────────────────────────────────────────
function renderRecords(){
  const months=getAllMonths();
  if(!months.includes(recMonth))recMonth=months[0]||todayStr().slice(0,7);
  document.getElementById('rec-filters').innerHTML=months.map(m=>{
    const[y,mo]=m.split('-');
    return`<div class="filter-chip ${m===recMonth?'active':''}" onclick="setRecMonth('${m}')">${parseInt(mo)}月${parseInt(y)!==new Date().getFullYear()?' '+y:''}</div>`;
  }).join('');
  let txs=transactions.filter(t=>getYM(t.date)===recMonth);
  if(recTab==='expense')txs=txs.filter(t=>t.txType!=='income');
  if(recTab==='income')txs=txs.filter(t=>t.txType==='income');
  txs=txs.sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('rec-list');
  if(!txs.length){el.innerHTML=`<div class="empty-state"><p>沒有記錄</p></div>`;return;}
  const grouped={};
  txs.forEach(t=>{if(!grouped[t.date])grouped[t.date]=[];grouped[t.date].push(t);});
  let html='';
  Object.keys(grouped).sort().reverse().forEach(date=>{
    const d=new Date(date+'T00:00:00'),wd=['日','一','二','三','四','五','六'];
    const de=grouped[date].filter(t=>t.txType!=='income').reduce((s,t)=>s+t.amount,0);
    const di=grouped[date].filter(t=>t.txType==='income').reduce((s,t)=>s+t.amount,0);
    let dl=`${d.getMonth()+1}/${d.getDate()} (${wd[d.getDay()]})`;
    if(de)dl+=` <span style="color:var(--red)">-${fmtMoney(de)}</span>`;
    if(di)dl+=` <span style="color:var(--green)">+${fmtMoney(di)}</span>`;
    html+=`<div style="margin-bottom:16px"><div style="font-size:13px;color:var(--muted);margin-bottom:6px">${dl}</div>`;
    grouped[date].forEach(t=>html+=txItemHtml(t));
    html+=`</div>`;
  });
  el.innerHTML=html;
}

function setRecMonth(m){recMonth=m;renderRecords();}
function setRecTab(t){
  recTab=t;
  document.querySelectorAll('#page-records .tab-btn').forEach((b,i)=>{b.classList.toggle('active',['all','expense','income'][i]===t);});
  renderRecords();
}

// ── OVERVIEW ─────────────────────────────────────────────
function renderOverview(){
  const el=document.getElementById('overview-content');
  if(!cards.length){el.innerHTML=`<div class="empty-state"><p>尚未設定信用卡</p></div>`;return;}
  let html='<div class="section-title">本期額度狀況</div>';
  cards.forEach(card=>{
    const bp=getBillingPeriod(card);
    const txs=transactions.filter(t=>t.cardName===card.name&&t.date>=bp.start&&t.date<=bp.end&&t.txType!=='income');
    const spent=txs.reduce((s,t)=>s+t.amount,0);
    const reward=txs.reduce((s,t)=>s+(t.reward||0),0);
    const limit=Number(card.limit),hasLimit=limit>0;
    const pct=hasLimit?Math.min(spent/limit,1):0;
    let bc,bt,fc;
    if(!hasLimit){bc='badge-unlimited';bt='無上限';fc='fill-ok';}
    else if(pct>=1){bc='badge-over';bt='已達上限';fc='fill-over';}
    else if(pct>=0.8){bc='badge-warn';bt='接近上限';fc='fill-warn';}
    else{bc='badge-ok';bt='額度充足';fc='fill-ok';}
    html+=`<div class="card"><div class="card-header"><div class="card-name">${card.name}</div><div class="card-badge ${bc}">${bt}</div></div>`;
    if(hasLimit)html+=`<div class="progress-row"><span>${fmtMoney(spent)} / ${fmtMoney(limit)}</span><span>剩 ${fmtMoney(Math.max(limit-spent,0))}</span></div><div class="progress-bar"><div class="progress-fill ${fc}" style="width:${(pct*100).toFixed(1)}%"></div></div>`;
    else html+=`<div class="progress-row"><span>本期消費：${fmtMoney(spent)}</span></div>`;
    html+=`<div class="stats-row"><div class="stat"><div class="stat-val">${fmtMoney(spent)}</div><div class="stat-label">本期消費</div></div><div class="stat"><div class="stat-val" style="color:var(--green)">${reward.toFixed(1)}</div><div class="stat-label">預計回饋</div></div><div class="stat"><div class="stat-val">${txs.length}</div><div class="stat-label">筆數</div></div></div>`;
    if(card.routes&&card.routes.length)html+=`<div style="margin-top:10px;display:flex;flex-wrap:wrap">${card.routes.map(r=>`<div class="route-chip">${r.channel} <span>${(Number(r.rate)*100).toFixed(1)}%</span></div>`).join('')}</div>`;
    html+=`<div style="font-size:12px;color:var(--muted);margin-top:8px">帳單截止：每月 ${card.billingDay} 號 ・ 本期：${bp.start} ~ ${bp.end}</div></div>`;
  });
  el.innerHTML=html;
}

// ── STATS ────────────────────────────────────────────────
function renderStats(){
  const months=getAllMonths();
  if(!months.length){document.getElementById('stats-month-label').textContent='—';document.getElementById('stats-content').innerHTML='<div class="empty-state"><p>尚無資料</p></div>';return;}
  statsMonthIdx=Math.max(0,Math.min(statsMonthIdx,months.length-1));
  const ym=months[statsMonthIdx],[y,m]=ym.split('-');
  document.getElementById('stats-month-label').textContent=`${y}年${parseInt(m)}月`;
  const txs=transactions.filter(t=>getYM(t.date)===ym);
  const inc=txs.filter(t=>t.txType==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.txType!=='income').reduce((s,t)=>s+t.amount,0);
  const reward=txs.reduce((s,t)=>s+(t.reward||0),0);
  let html=`<div class="summary-total"><div class="lbl">本月支出</div><div class="amt">${fmtMoney(exp)}</div><div class="sub">收入 ${fmtMoney(inc)} ・ 回饋 ${reward.toFixed(1)} 元</div></div>`;
  const cardTxs=txs.filter(t=>t.cardName&&t.txType!=='income');
  if(cardTxs.length){
    const cmap={};cardTxs.forEach(t=>{if(!cmap[t.cardName])cmap[t.cardName]={spent:0,reward:0};cmap[t.cardName].spent+=t.amount;cmap[t.cardName].reward+=t.reward||0;});
    html+=`<div class="card"><div style="font-weight:600;margin-bottom:10px">各卡刷卡</div>`;
    Object.entries(cmap).forEach(([name,v])=>{html+=`<div class="sum-row"><div>${name}</div><div class="sum-right"><div>${fmtMoney(v.spent)}</div><div class="sum-sub">+${v.reward.toFixed(1)} 回饋</div></div></div>`;});
    html+=`</div>`;
  }
  const expTxs=txs.filter(t=>t.txType!=='income');
  if(expTxs.length){
    const cmap={};expTxs.forEach(t=>{const k=t.category||'其他';if(!cmap[k])cmap[k]={icon:getIcon(k),total:0};cmap[k].total+=t.amount;});
    html+=`<div class="card"><div style="font-weight:600;margin-bottom:10px">支出分類</div>`;
    Object.entries(cmap).sort((a,b)=>b[1].total-a[1].total).forEach(([name,v])=>{
      const pct=exp>0?(v.total/exp*100).toFixed(1):0;
      html+=`<div class="sum-row"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${v.icon}</span><span>${name}</span></div><div class="sum-right"><div>${fmtMoney(v.total)}</div><div style="font-size:12px;color:var(--muted)">${pct}%</div></div></div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('stats-content').innerHTML=html;
}

function changeStatsMonth(dir){statsMonthIdx=Math.max(0,Math.min(statsMonthIdx-dir,getAllMonths().length-1));renderStats();}

function renderTxCatGrid(){
  document.getElementById('tx-cat-grid').innerHTML=categories.map((c,i)=>`
    <div class="cat-item ${c.name===_selCat?'selected':''}" onclick="selectCatByIdx(${i})">
      <div class="ci">${getIcon(c.name)}</div><div>${c.name}</div>
    </div>`).join('');
  renderSubcatRow();
}

function selectCatByIdx(i){_selCat=categories[i]?categories[i].name:'';_selSubcat='';renderTxCatGrid();}

function renderSubcatRow(){
  const cat=getCatObj(_selCat);
  const el=document.getElementById('tx-subcat-row');
  if(!cat||!cat.subs||!cat.subs.length){el.innerHTML='';return;}
  el.innerHTML=cat.subs.map((s,i)=>`<div class="subcat-chip ${s===_selSubcat?'selected':''}" onclick="selectSubcatByIdx(${i})">${s}</div>`).join('');
}

function selectSubcatByIdx(i){const cat=getCatObj(_selCat);if(cat&&cat.subs&&cat.subs[i]!==undefined){_selSubcat=cat.subs[i];renderSubcatRow();}}

function renderTxPayRow(){
  document.getElementById('tx-pay-row').innerHTML=payMethods.map((p,i)=>`
    <div class="pay-btn ${p===_selPay?'selected':''}" onclick="selectPayByIdx(${i})">${p}</div>`).join('');
}

function selectPayByIdx(i){if(payMethods[i]!==undefined){_selPay=payMethods[i];renderTxPayRow();}}

function populateCardSelect(selId){
  const s=document.getElementById('tx-card');
  s.innerHTML='<option value="">-- 選擇卡片（選填）--</option>';
  cards.forEach(c=>{s.innerHTML+=`<option value="${c.id}" ${c.id===selId?'selected':''}>${c.name}</option>`;});
}

function updateRouteOptions(){
  const cardId=document.getElementById('tx-card').value;
  const card=getCardById(cardId);
  const rg=document.getElementById('route-group'),sel=document.getElementById('tx-route');
  if(!card||!card.routes||!card.routes.length){rg.style.display='none';document.getElementById('reward-preview-box').style.display='none';return;}
  rg.style.display='block';
  sel.innerHTML='<option value="">-- 選擇方案 --</option>';
  card.routes.forEach(r=>{sel.innerHTML+=`<option value="${r.channel}">${r.channel}（${(Number(r.rate)*100).toFixed(1)}%）</option>`;});
  updateRewardPreview();
}

function updateRewardPreview(){
  const cardId=document.getElementById('tx-card').value;
  const channel=document.getElementById('tx-route').value;
  const amount=parseFloat(document.getElementById('tx-amount').value)||0;
  const box=document.getElementById('reward-preview-box');
  if(!cardId||!channel||amount<=0){box.style.display='none';return;}
  const r=amount*getRate(cardId,channel);
  if(r>0){document.getElementById('reward-preview-val').textContent=r.toFixed(2)+' 元';box.style.display='block';}
  else box.style.display='none';
}

async function saveTx(){
  const date=document.getElementById('tx-date').value;
  const name=document.getElementById('tx-name').value.trim();
  const amount=parseFloat(document.getElementById('tx-amount').value);
  const note=document.getElementById('tx-note').value.trim();
  const editId=document.getElementById('tx-edit-id').value;
  if(!date||isNaN(amount)||amount<=0){showToast('請填入日期和金額');return;}
  const cardId=document.getElementById('tx-card').value;
  const card=getCardById(cardId);
  const channel=document.getElementById('tx-route').value;
  const rate=cardId&&channel?getRate(cardId,channel):0;
  const reward=amount*rate;
  const btn=document.getElementById('tx-save-btn');btn.disabled=true;btn.textContent='儲存中…';
  const tx={date,name,amount,category:_selCat,subcategory:_selSubcat,payment:_selPay,cardName:card?card.name:'',channel,rate,reward,note,txType:_txType};
  try{
    if(editId){
      await sb('transactions','PATCH',tx,`?id=eq.${editId}`);
      const idx=transactions.findIndex(t=>t.id===editId);
      if(idx>=0)transactions[idx]={...transactions[idx],...tx,id:editId};
    }else{
      tx.id=uid();
      await sb('transactions','POST',tx);
      transactions.unshift(normTx(tx));
    }
    closeModal('tx-modal');showToast('已儲存 ✓');
    if(currentPage==='home')renderCalendar();
    if(currentPage==='records')renderRecords();
    if(currentPage==='overview')renderOverview();
  }catch(e){showToast('儲存失敗，請重試');console.error(e);}
  btn.disabled=false;btn.textContent='儲存';
}

async function deleteTx(){
  const id=document.getElementById('tx-edit-id').value;
  if(!id||!confirm('確定刪除？'))return;
  try{
    await sb('transactions','DELETE',null,`?id=eq.${id}`);
    transactions=transactions.filter(t=>t.id!==id);
    closeModal('tx-modal');showToast('已刪除');
    if(currentPage==='home')renderCalendar();
    if(currentPage==='records')renderRecords();
    if(currentPage==='overview')renderOverview();
  }catch(e){showToast('刪除失敗');}
}

// ── CARD MODAL ───────────────────────────────────────────
function openAddCardModal(){
  document.getElementById('card-modal-title').textContent='新增信用卡';
  ['card-name','card-billing-day','card-limit','card-last-entry','card-reward-date'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('card-edit-id').value='';
  document.getElementById('card-delete-btn').style.display='none';
  document.getElementById('card-save-btn').textContent='儲存卡片';
  document.getElementById('card-save-btn').disabled=false;
  routeRows=[];renderRouteEditor();
  document.getElementById('card-modal').classList.add('open');
}

function openEditCardModal(id){
  const card=getCardById(id);if(!card)return;
  document.getElementById('card-modal-title').textContent='編輯卡片';
  document.getElementById('card-name').value=card.name;
  document.getElementById('card-billing-day').value=card.billingDay;
  document.getElementById('card-limit').value=card.limit;
  document.getElementById('card-last-entry').value=card.lastEntryDate||'';
  document.getElementById('card-reward-date').value=card.rewardDate||'';
  document.getElementById('card-edit-id').value=card.id;
  document.getElementById('card-delete-btn').style.display='block';
  document.getElementById('card-save-btn').textContent='儲存卡片';
  document.getElementById('card-save-btn').disabled=false;
  routeRows=(card.routes||[]).map(r=>({...r}));renderRouteEditor();
  document.getElementById('card-modal').classList.add('open');
}

function renderRouteEditor(){
  document.getElementById('routes-editor').innerHTML=routeRows.map((r,i)=>`
    <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input type="text" placeholder="方案名稱" value="${r.channel||''}" oninput="routeRows[${i}].channel=this.value" style="flex:2">
      <input type="number" placeholder="%" value="${r.rate?(Number(r.rate)*100).toFixed(1):''}" step="0.1" min="0" oninput="routeRows[${i}].rate=parseFloat(this.value)/100||0" style="flex:1">
      <button type="button" onclick="removeRoute(${i})" style="border:none;background:none;color:var(--red);font-size:22px;cursor:pointer">×</button>
    </div>`).join('');
}

function addRouteRow(){routeRows.push({channel:'',rate:0});renderRouteEditor();}
function removeRoute(i){routeRows.splice(i,1);renderRouteEditor();}

async function saveCard(){
  const name=document.getElementById('card-name').value.trim();
  const billingDay=parseInt(document.getElementById('card-billing-day').value)||1;
  const limit=parseInt(document.getElementById('card-limit').value)||0;
  const rewardDate=document.getElementById('card-reward-date').value.trim();
  const lastEntryDate=document.getElementById('card-last-entry').value||null;
  const editId=document.getElementById('card-edit-id').value;
  if(!name){showToast('請填入卡片名稱');return;}
  const cleanRoutes=routeRows.filter(r=>r.channel.trim());
  const btn=document.getElementById('card-save-btn');btn.disabled=true;btn.textContent='儲存中…';
  try{
    const cardData={id:editId||uid(),name,billingDay,limit,rewardDate,lastEntryDate};
    if(editId){
      await sb('cards','PATCH',{name,billingDay,limit,rewardDate,lastEntryDate},`?id=eq.${editId}`);
      await sb('routes','DELETE',null,`?cardId=eq.${editId}`);
    }else{
      await sb('cards','POST',cardData);
    }
    for(const r of cleanRoutes){
      await sb('routes','POST',{cardId:cardData.id,channel:r.channel,rate:r.rate,cardName:name});
    }
    cardData.routes=cleanRoutes;
    if(editId){const idx=cards.findIndex(c=>c.id===editId);if(idx>=0)cards[idx]=cardData;}
    else cards.push(cardData);
    closeModal('card-modal');showToast('卡片已儲存 ✓');
    renderSettings();if(currentPage==='overview')renderOverview();
  }catch(e){showToast('儲存失敗');console.error(e);}
  btn.disabled=false;btn.textContent='儲存卡片';
}

async function deleteCard(){
  const id=document.getElementById('card-edit-id').value;
  if(!id||!confirm('確定刪除這張卡？'))return;
  try{
    await sb('routes','DELETE',null,`?cardId=eq.${id}`);
    await sb('cards','DELETE',null,`?id=eq.${id}`);
    cards=cards.filter(c=>c.id!==id);
    closeModal('card-modal');showToast('已刪除');
    renderSettings();if(currentPage==='overview')renderOverview();
  }catch(e){showToast('刪除失敗');}
}

// ── SETTINGS ─────────────────────────────────────────────
function renderSettings(){
  let html='';
  if(!cards.length)html=`<div class="empty-state"><p>尚無卡片</p></div>`;
  else cards.forEach(c=>{
    html+=`<div class="settings-card"><div class="settings-row"><div><div style="font-size:15px;font-weight:500">${c.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">結帳日：${c.billingDay}號 ・ 上限：${Number(c.limit)>0?fmtMoney(Number(c.limit)):'無上限'}</div></div><button class="settings-edit-btn" onclick="openEditCardModal('${c.id}')">編輯</button></div></div>`;
  });
  document.getElementById('cards-settings').innerHTML=html;
}

// ── PAY MANAGE ───────────────────────────────────────────
function renderPayManage(){
  const el=document.getElementById('pay-manage');
  if(!payMethods.length){el.innerHTML=`<div class="empty-state"><p>尚無付款方式</p></div>`;return;}
  el.innerHTML=payMethods.map((p,i)=>`
    <div class="manage-item">
      <div class="manage-left"><span>💳</span><span style="font-size:15px">${p}</span></div>
      <button class="del-btn" onclick="deletePayMethod(${i})">×</button>
    </div>`).join('');
}

async function addPayMethod(){
  const input=document.getElementById('new-pay-name');
  const name=input.value.trim();
  if(!name){showToast('請填入名稱');return;}
  if(payMethods.includes(name)){showToast('已存在');return;}
  try{
    await sb('payment','POST',{payment:name});
    payMethods.push(name);input.value='';renderPayManage();showToast('已新增 ✓');
  }catch(e){showToast('新增失敗');}
}

async function deletePayMethod(i){
  const name=payMethods[i];
  if(!confirm(`確定刪除「${name}」？`))return;
  try{
    await sb('payment','DELETE',null,`?payment=eq.${encodeURIComponent(name)}`);
    payMethods.splice(i,1);renderPayManage();showToast('已刪除');
  }catch(e){showToast('刪除失敗');}
}

// ── CAT MANAGE ───────────────────────────────────────────
function renderCatManage(){
  const el=document.getElementById('cat-manage');
  if(!categories.length){el.innerHTML=`<div class="empty-state"><p>尚無類別</p></div>`;return;}
  el.innerHTML=categories.map((c,i)=>`
    <div class="manage-item">
      <div class="manage-left">
        <span style="font-size:22px">${getIcon(c.name)}</span>
        <div>
          <div style="font-size:15px;font-weight:500">${c.name}</div>
          ${c.subs&&c.subs.length?`<div style="font-size:12px;color:var(--muted)">${c.subs.join('、')}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="edit-btn-sm" onclick="moveCat(${i},-1)" style="font-size:16px;padding:2px 6px" ${i===0?'disabled':''}>↑</button>
        <button class="edit-btn-sm" onclick="moveCat(${i},1)" style="font-size:16px;padding:2px 6px" ${i===categories.length-1?'disabled':''}>↓</button>
        <button class="edit-btn-sm" onclick="openEditCatModal(${i})">編輯</button>
        <button class="del-btn" onclick="deleteCat(${i})">×</button>
      </div>
    </div>`).join('');
}

function openAddCatModal(){
  document.getElementById('cat-modal-title').textContent='新增類別';
  document.getElementById('cat-icon-input').value='';
  document.getElementById('cat-name').value='';
  document.getElementById('cat-subcats').value='';
  document.getElementById('cat-edit-old-name').value='';
  document.getElementById('cat-save-btn').textContent='新增類別';
  document.getElementById('cat-save-btn').disabled=false;
  document.getElementById('cat-modal').classList.add('open');
}

function openEditCatModal(i){
  const cat=categories[i];if(!cat)return;
  document.getElementById('cat-modal-title').textContent='編輯類別';
  document.getElementById('cat-icon-input').value=iconOverrides[cat.name]||'';
  document.getElementById('cat-name').value=cat.name;
  document.getElementById('cat-subcats').value=(cat.subs||[]).join('\n');
  document.getElementById('cat-edit-old-name').value=cat.name;
  document.getElementById('cat-save-btn').textContent='儲存變更';
  document.getElementById('cat-save-btn').disabled=false;
  document.getElementById('cat-modal').classList.add('open');
}

async function saveCat(){
  const icon=document.getElementById('cat-icon-input').value.trim();
  const name=document.getElementById('cat-name').value.trim();
  const oldName=document.getElementById('cat-edit-old-name').value;
  const subsRaw=document.getElementById('cat-subcats').value;
  const subs=subsRaw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!name){showToast('請填入類別名稱');return;}
  if(icon)iconOverrides[name]=icon;else delete iconOverrides[name];
  const btn=document.getElementById('cat-save-btn');btn.disabled=true;
  try{
    // delete old rows
    if(oldName)await sb('category','DELETE',null,`?category=eq.${encodeURIComponent(oldName)}`);
    // insert new rows
    const newSortOrder=oldName?categories.findIndex(c=>c.name===oldName):categories.length;
    const rows=subs.length?subs.map(s=>({category:name,subcategory:s,icon:icon||null,sortOrder:newSortOrder})):[{category:name,subcategory:null,icon:icon||null,sortOrder:newSortOrder}];
    await sb('category','POST',rows);
    // update local
    const catObj={name,subs,icon:icon||''};
    if(icon)iconOverrides[name]=icon;else delete iconOverrides[name];
    if(oldName){const idx=categories.findIndex(c=>c.name===oldName);if(idx>=0)categories[idx]=catObj;else categories.push(catObj);}
    else categories.push(catObj);
    closeModal('cat-modal');renderCatManage();showToast('已儲存 ✓');
  }catch(e){showToast('儲存失敗');console.error(e);}
  btn.disabled=false;
}

async function moveCat(i,dir){
  const j=i+dir;
  if(j<0||j>=categories.length)return;
  [categories[i],categories[j]]=[categories[j],categories[i]];
  // save new order - update all sortOrder values
  try{
    for(let k=0;k<categories.length;k++){
      await sb('category','PATCH',{sortOrder:k},`?category=eq.${encodeURIComponent(categories[k].name)}`);
    }
    renderCatManage();showToast('順序已更新');
  }catch(e){showToast('更新失敗');}
}

async function deleteCat(i){
  const cat=categories[i];if(!cat)return;
  if(!confirm(`確定刪除「${cat.name}」及所有子類別？`))return;
  try{
    await sb('category','DELETE',null,`?category=eq.${encodeURIComponent(cat.name)}`);
    categories.splice(i,1);renderCatManage();showToast('已刪除');
  }catch(e){showToast('刪除失敗');}
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});

init();
</script>
